services:
  - type: web
    name: shmup
    env: docker
    plan: free
    dockerfilePath: ./shmup/Dockerfile
    dockerContext: ./shmup
    healthCheckPath: /
    envVars:
      - key: PHX_SERVER
        value: "true"
      - key: PHX_HOST
        fromService:
          type: web
          name: shmup
          property: host
      # Render's `generateValue: true` produces a value shorter than the 64
      # bytes Phoenix's cookie store requires for secret_key_base, which
      # crashes every request with "cookie store expects conn.secret_key_base
      # to be at least 64 bytes". Set this manually in the Render dashboard
      # instead, using a value from `mix phx.gen.secret` (run from `shmup/`).
      - key: SECRET_KEY_BASE
        sync: false
